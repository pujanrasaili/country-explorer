<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-globe">🌍</span>
        <span class="logo-text">Country<em>Explorer</em></span>
      </div>
      <div class="header-nav">
        <button class="nav-btn active" data-view="all">All</button>
        <button class="nav-btn" data-view="favorites">
          <span>❤️</span> Favorites
          <span class="fav-badge" id="favBadge" style="display:none">0</span>
        </button>
        <span class="country-count" id="countryCount"></span>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <main class="main">

    <section class="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-content">
        <p class="hero-eyebrow">World Atlas</p>
        <h1 class="hero-title">
          Explore<br>
          <em class="hero-accent">Every Nation</em>
        </h1>
        <p class="hero-sub">Discover flags, capitals, populations and more across <span class="hero-counter" id="heroCounter">0</span> countries.</p>
      </div>
    </section>

    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search country, capital, region…" autocomplete="off" />
        <button class="clear-btn hidden" id="clearBtn">✕</button>
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="filters" id="filtersRow">
        <button class="filter-pill active" data-region="all">🌐 All</button>
        <button class="filter-pill" data-region="Africa">🌍 Africa</button>
        <button class="filter-pill" data-region="Americas">🌎 Americas</button>
        <button class="filter-pill" data-region="Asia">🌏 Asia</button>
        <button class="filter-pill" data-region="Europe">🏰 Europe</button>
        <button class="filter-pill" data-region="Oceania">🏝️ Oceania</button>
      </div>

      <div class="sort-row">
        <span class="results-label" id="resultsLabel"></span>
        <select id="sortSelect">
          <option value="name">A → Z</option>
          <option value="name-desc">Z → A</option>
          <option value="population">Population ↓</option>
          <option value="population-asc">Population ↑</option>
          <option value="area">Area ↓</option>
        </select>
      </div>
    </div>

    <!-- Skeleton -->
    <div class="skeleton-grid" id="skeletonGrid">
      ${Array(12).fill('<div class="skeleton-card"><div class="sk sk-img"></div><div class="sk sk-title"></div><div class="sk sk-line"></div><div class="sk sk-line short"></div></div>').join('')}
    </div>

    <div class="grid" id="countryGrid"></div>

    <div class="error hidden" id="errorMsg">
      <div class="error-icon">⚠️</div>
      <p>Could not load countries.</p>
      <button class="btn-retry" id="retryBtn">Try Again</button>
    </div>

    <div class="empty hidden" id="emptyMsg">
      <div class="empty-icon">🔍</div>
      <p id="emptyText">No countries found.</p>
    </div>

  </main>

  <button class="scroll-top hidden" id="scrollTop">↑</button>

  <footer class="footer">
    <div class="footer-inner">
      <span>Built by <a href="https://github.com/pujanrasaili" target="_blank">Pujan Rasaili</a></span>
      <span>Data from <a href="https://restcountries.com" target="_blank">REST Countries API</a></span>
    </div>
  </footer>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
